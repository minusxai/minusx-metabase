name: Deploy (manual)

on: workflow_dispatch

jobs:
  deploy-web-minusxapi-com:
    runs-on: ubuntu-latest
    steps:
    - name: Debug host
      run: |
        echo "HOST='${{ secrets.AWS_SIDECHAT_HOST }}'"
        
    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.APPS_SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
        echo "${{ secrets.APPS_SERVER_SSH_PUB_KEY }}" > ~/.ssh/id_rsa.pub
        chmod 600 ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa.pub
        ssh-keyscan -H ${{ secrets.AWS_SIDECHAT_HOST }} >> ~/.ssh/known_hosts

    - name: Run frontend server (v1)
      env:
        REF: ${{ github.sha }} # ref to checkout
      run: |
        ssh  ${{ secrets.APPS_SERVER_USER }}@${{ secrets.AWS_SIDECHAT_HOST }} << EOF
          set -e  # Exit on any error
          cd /home/ubuntu/minusx-metabase/web
          git fetch --all --tags
          git checkout $REF
          git reset --hard $REF
          docker compose up -d --build
          docker image prune -f
        EOF
          
